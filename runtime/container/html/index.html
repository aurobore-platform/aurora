<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Aurobore Container M1</title>
    <link rel="stylesheet" href="css/aurobore-chrome.css" data-aurobore-chrome="1" />
    <link rel="stylesheet" href="css/app.css" />
    <script src="js/aurobore-bridge.js"></script>
    <script src="js/aurobore-plugins.js"></script>
    <script src="js/app.js" defer></script>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Aurobore M3</h1>
        <p id="status">Загрузка…</p>
      </header>
      <nav>
        <button type="button" data-route="/">Главная</button>
        <button type="button" data-route="/about">О приложении</button>
        <button type="button" data-route="/settings">Настройки</button>
      </nav>
      <main id="view"></main>
      <footer>
        <button type="button" id="btn-back">← Назад (SPA)</button>
        <button type="button" id="btn-sim-back">Симуляция «назад»</button>
        <label for="a2-keyboard-test">A2 keyboard:</label>
        <input type="text" id="a2-keyboard-test" placeholder="Фокус → проверка inset клавиатуры" />
      </footer>
    </div>
  </body>
</html>
