<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geo Demo</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <main>
    <h1>Geo Demo</h1>
    <p id="status">Initializing…</p>

    <section>
      <h2>Geolocation plugin (A3)</h2>
      <p class="hint">Native stub returns <code>GEOLOCATION_UNAVAILABLE</code> until GPS iteration.</p>
      <div class="actions">
        <button type="button" id="btn-get-position">Get Position</button>
        <button type="button" id="btn-watch">Start Watch</button>
        <button type="button" id="btn-stop" disabled>Stop Watch</button>
        <button type="button" id="btn-clear-watch" disabled>Clear Watch</button>
      </div>
      <pre id="log" class="log"></pre>
    </section>
  </main>
  <script src="js/aurobore-bridge.js"></script>
  <script src="js/aurobore-plugins.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
