<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Demo</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <main>
    <h1>Camera Demo</h1>
    <p id="status">Initializing…</p>

    <section>
      <h2>Camera plugin</h2>
      <p class="hint">Pick from gallery or capture with camera; preview via <code>resolveResourceUrl</code>.</p>
      <div class="actions">
        <button type="button" id="btn-get-photo">Get Photo</button>
        <button type="button" id="btn-pick-photo">Pick Photo</button>
      </div>
      <pre id="log" class="log"></pre>
      <img id="preview" class="preview" alt="Photo preview" hidden />
    </section>
  </main>
  <script src="js/aurobore-bridge.js"></script>
  <script src="js/aurobore-plugins.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
