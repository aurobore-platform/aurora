<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <main>
    <h1>Hello World</h1>
    <p id="status">Initializing…</p>

    <section>
      <h2>Echo plugin</h2>
      <div class="actions">
        <button type="button" id="btn-ping">ping</button>
        <button type="button" id="btn-echo">echo</button>
        <button type="button" id="btn-fail">fail (error)</button>
        <button type="button" id="btn-stream">watchTicks</button>
        <button type="button" id="btn-stop" disabled>stop stream</button>
      </div>
      <pre id="log" class="log"></pre>
    </section>

    <section>
      <h2>Device</h2>
      <button type="button" id="btn-device">getInfo</button>
      <pre id="device" class="log"></pre>
    </section>

    <section>
      <h2>Bridge benchmark</h2>
      <p class="hint">100× Echo.ping + short watchTicks stream (V-7).</p>
      <div class="actions">
        <button type="button" id="btn-bench">Benchmark</button>
      </div>
      <pre id="bench" class="log"></pre>
    </section>

    <section>
      <h2>Lifecycle</h2>
      <ul id="lifecycle" class="lifecycle"></ul>
    </section>
  </main>
  <script src="js/aurobore-bridge.js"></script>
  <script src="js/aurobore-plugins.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
